<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thinkcloudly | AWS S3 Static Website</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f6f7fb;
            color: #1b1f3b;
        }

        /* Header */
        header {
            background: #ffffff;
            padding: 18px 40px;
            border-bottom: 4px solid #ff7a59;
            display: flex;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #1b1f3b;
        }

        header h1 span {
            color: #ff7a59;
        }

        /* Main section */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 90px);
        }

        .card {
            background: #ffffff;
            width: 540px;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card h2 {
            color: #1b1f3b;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .card h3 {
            color: #ff7a59;
            margin-top: 0;
            font-weight: 600;
        }

        .card p {
            font-size: 16px;
            color: #4a4a68;
            margin: 10px 0;
        }

        .features {
            margin-top: 20px;
            background: #f6f7fb;
            padding: 18px;
            border-radius: 8px;
        }

        .features span {
            display: inline-block;
            margin: 6px 10px;
            font-weight: 600;
            color: #1b1f3b;
        }

        footer {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

    <header>
        <h1>think<span>cloudly</span></h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>AWS S3 Static Website</h2>
            <h3>Serverless • Scalable • Cost-Effective</h3>

            <p>
                This website is hosted using <strong>Amazon S3 Static Website Hosting</strong>.
            </p>
            <p>
                Built as part of a live AWS Bootcamp demonstration.
            </p>

            <div class="features">
                <span>✔ No EC2</span>
                <span>✔ No Servers</span>
                <span>✔ No OS</span>
                <span>✔ Low Cost</span>
                <span>✔ High Availability</span>
            </div>

            <footer>
                Upscale your career in IT | Powered by AWS
            </footer>
        </div>
    </div>

</body>
</html>
